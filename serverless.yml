# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: khabarinshort
# "service" is the name of this project. This will also be added to your AWS resource names.
service: KhabarInShort

frameworkVersion: "4"

provider:
  name: aws
  region: ap-south-1
  runtime: nodejs24.x
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource:
            - arn:aws:s3:::khabarinshort/*
        - Effect: Allow
          Action:
            - cloudfront:CreateInvalidation
          Resource: "*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - arn:aws:lambda:${self:provider.region}:*:function:${self:service}-${sls:stage}-postCreator

package:
  individually: true

layers:
  scrapper:
    path: layers/scrapper

functions:
  dharitri:
    handler: scrapper/dharirti.handler
    timeout: 90
    environment:
      NEWS_BUCKET: ${env:NEWS_BUCKET, "khabarinshort"}
      DHARITRI_KEY: ${env:DHARITRI_KEY, "dharitri.json"}
    package:
      exclude:
        - scrapper/sambad.js
        - scrapper/prameya.js
    layers:
      - { Ref: ScrapperLambdaLayer }
  sambad:
    handler: scrapper/sambad.handler
    timeout: 60
    environment:
      NEWS_BUCKET: ${env:NEWS_BUCKET, "khabarinshort"}
      SAMBAD_KEY: ${env:SAMBAD_KEY, "sambad.json"}
    package:
      exclude:
        - scrapper/dharirti.js
        - scrapper/prameya.js
    layers:
      - { Ref: ScrapperLambdaLayer }
    events:
      - schedule: rate(5 minutes)
  prameya:
    handler: scrapper/prameya.handler
    package:
      exclude:
        - scrapper/dharirti.js
        - scrapper/sambad.js
    layers:
      - { Ref: ScrapperLambdaLayer }
  postCreator:
    handler: scrapper/postCreator.handler
    architecture: x86_64
    timeout: 180
    memorySize: 1024
    environment:
      POST_IMAGES_BUCKET: ${env:POST_IMAGES_BUCKET, "khabarinshort"}
      CLOUDFRONT_DOMAIN: ${env:CLOUDFRONT_DOMAIN, "d2berfdio9bieg.cloudfront.net"}
      FACEBOOK_PAGE_ID: ${env:FACEBOOK_PAGE_ID, ""}
      FACEBOOK_ACCESS_TOKEN: ${env:FACEBOOK_ACCESS_TOKEN, ""}
      INSTAGRAM_ACCOUNT_ID: ${env:INSTAGRAM_ACCOUNT_ID, ""}
      INSTAGRAM_ACCESS_TOKEN: ${env:INSTAGRAM_ACCESS_TOKEN, ""}
      THREADS_API_TOKEN: ${env:THREADS_API_TOKEN, ""}
    package:
      include:
        - assets/**
        - services/**
      exclude:
        - scrapper/dharirti.js
        - scrapper/sambad.js
        - scrapper/prameya.js
    layers:
      - { Ref: ScrapperLambdaLayer }
      - arn:aws:lambda:ap-south-1:473339302343:layer:sharp-image:2
    events:
      - http:
          path: post-creator
          method: post
          cors: true
  aggregator:
    handler: scrapper/aggregator.handler
    timeout: 90
    environment:
      NEWS_BUCKET: ${env:NEWS_BUCKET, "khabarinshort"}
      AGGREGATOR_SOURCES: ${env:AGGREGATOR_SOURCES, ""}
      LATEST_NEWS_KEY: ${env:LATEST_NEWS_KEY, "latest.json"}
      FCM_TOPIC: ${env:FCM_TOPIC, "all"}
      CLOUDFRONT_DISTRIBUTION_ID: ${env:CLOUDFRONT_DISTRIBUTION_ID, "E228ARQQG8BLTJ"}
      POST_CREATOR_FUNCTION_NAME: ${env:POST_CREATOR_FUNCTION_NAME, "${self:service}-${sls:stage}-postCreator"}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${env:FIREBASE_SERVICE_ACCOUNT_BASE64, ""}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${env:FIREBASE_SERVICE_ACCOUNT_JSON, ""}
    package:
      exclude:
        - scrapper/dharirti.js
        - scrapper/sambad.js
        - scrapper/prameya.js
        - scrapper/postCreator.js
    layers:
      - { Ref: ScrapperLambdaLayer }
    events:
      - schedule: rate(30 minutes)
